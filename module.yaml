repositories:
  - id: mavenLocal
    url: mavenLocal
    resolve: false
    publish: true

product:
  type: kmp/lib
  platforms: [ jvm, linuxArm64, linuxX64, macosArm64, mingwX64, js, wasmJs ]

description: KMP library for Symantec VIP Access protocol

settings:
  jvm:
    release: 21
    storeParameterNames: true
    jdk:
      version: 26
      distributions: [ zulu, temurin ]
    test:
      junitPlatformVersion: 6.1.0
      freeJvmArgs:
        - --enable-native-access=ALL-UNNAMED
        - -Djunit.platform.reporting.open.xml.enabled=true

  kotlin:
    version: 2.4.0
    languageVersion: 2.4
    apiVersion: 2.4
    progressiveMode: true
    allWarningsAsErrors: true
    suppressWarnings: false
    powerAssert: enabled
    verbose: false
    freeCompilerArgs:
      - -Xexplicit-api=strict
      - -Wextra
      - -Xcollection-literals
      - -Xreport-all-warnings
      - -Xreturn-value-checker=full
      - -Xcontext-sensitive-resolution
      - -Xconsistent-data-class-copy-visibility
      - -Xname-based-destructuring=complete
    optIns:
      - kotlin.ExperimentalStdlibApi
      - kotlin.ExperimentalUnsignedTypes
      - kotlin.contracts.ExperimentalContracts
      - kotlin.io.encoding.ExperimentalEncodingApi
      - kotlin.time.ExperimentalTime
      - kotlinx.coroutines.ExperimentalCoroutinesApi
      - kotlinx.serialization.ExperimentalSerializationApi
      - kotlin.ExperimentalMultiplatform
      - kotlin.uuid.ExperimentalUuidApi
      - kotlin.concurrent.atomics.ExperimentalAtomicApi
      - dev.whyoleg.cryptography.DelicateCryptographyApi

    serialization:
      version: 1.11.0
      format: json

  publishing:
    enabled: true
    group: dev.suresh.vipaccess
    version: 0.1.0
    mavenCentral:
      enabled: true
      publishingMode: auto
    signArtifacts: true
    publishSources: true
    pom:
      url: https://github.com/sureshg/kotlin-vipaccess
      scm: https://github.com/sureshg/kotlin-vipaccess.git
      developers:
        - name: Suresh
          url: https://suresh.dev
      licenses:
        - name: The Apache License, Version 2.0
          url: https://www.apache.org/licenses/LICENSE-2.0.txt

settings@native:
  kotlin:
    optIns:
      - kotlinx.cinterop.ExperimentalForeignApi
      - kotlin.experimental.ExperimentalNativeApi

test-settings:
  kotlin:
    freeCompilerArgs:
      - -Xexplicit-api=disable

dependencies:
  - bom: $libs.kotlin.bom
  - bom: $libs.kotlinx.coroutines.bom
  - bom: $libs.kotlinx.serialization.bom
  - bom: $libs.ktor.bom
  - $libs.kotlinx.coroutines.core
  - $libs.kotlin.logging
  - $libs.ktor.client.core
  - $libs.ktor.client.cio
  - $libs.ktor.client.content.negotiation
  - $libs.ktor.client.encoding
  - $libs.ktor.client.logging
  - $libs.ktor.client.resources
  - $libs.ktor.client.auth
  - $libs.ktor.client.serialization
  - $libs.ktor.client.websockets
  - $libs.ktor.serialization.xml
  - $libs.kotlin.cryptography.core
  - $libs.kotlin.cryptography.optimal
  - $libs.kotlin.base32

dependencies@native:
  - $libs.ktor.client.curl

test-dependencies:
  - $libs.kotlin.test
  - $libs.kotlinx.coroutines.test
  - $libs.ktor.client.mock
